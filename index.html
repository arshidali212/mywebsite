<!DOCTYPE html>
<html>
<head>
  <title>Arshid Ali | Official Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    header {
      padding: 80px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: white;
      color: #1e3c72;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ddd;
    }

    section {
      padding: 60px 20px;
      background: white;
      color: #333;
    }

    footer {
      padding: 20px;
      background: #111;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Hi, I'm Arshid 👋</h1>
    <p>Welcome to my professional website</p>
    <a href="#" class="btn">Contact Me</a>
  </header>

  <section>
    <h2>About Me</h2>
    <p>I am learning web development and building amazing things using AI.</p>
  </section>

  <footer>
    © 2026 Arshid Ali | Built with GitHub Pages
  </footer>

</body>
</html>
