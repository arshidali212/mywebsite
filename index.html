<!DOCTYPE html>
<html>
<head>
  <title>Arshid | Premium Experience</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    * {margin:0;padding:0;box-sizing:border-box;}
    body {font-family:'Poppins',sans-serif;background:black;color:white;overflow-x:hidden;}

    nav {
      position:fixed;
      width:100%;
      display:flex;
      justify-content:space-between;
      padding:20px 50px;
      background:rgba(0,0,0,0.6);
      z-index:10;
    }

    nav a {
      color:white;
      text-decoration:none;
      margin-left:25px;
      font-weight:600;
      letter-spacing:1px;
    }

    .hero {
      height:100vh;
      background:url('https://images.unsplash.com/photo-1519741497674-611481863552') no-repeat center center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      position:relative;
    }

    .hero::before {
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.6);
    }

    .hero-content {
      position:relative;
      animation:fadeIn 2s ease forwards;
    }

    .hero h1 {
      font-size:65px;
      font-weight:800;
      letter-spacing:4px;
    }

    .hero p {
      margin-top:20px;
      font-size:20px;
      font-weight:300;
    }

    .btn {
      margin-top:30px;
      padding:15px 35px;
      background:white;
      color:black;
      text-decoration:none;
      font-weight:600;
      border-radius:30px;
      transition:0.3s;
    }

    .btn:hover {background:#ddd;}

    section {
      padding:120px 20px;
      text-align:center;
      animation:fadeUp 1.5s ease forwards;
    }

    footer {
      padding:20px;
      text-align:center;
      background:#111;
      font-size:14px;
    }

    @keyframes fadeIn {
      from {opacity:0;transform:translateY(40px);}
      to {opacity:1;transform:translateY(0);}
    }

    @keyframes fadeUp {
      from {opacity:0;transform:translateY(60px);}
      to {opacity:1;transform:translateY(0);}
    }

  </style>
</head>
<body>

  <nav>
    <div><strong>ARSHID</strong></div>
    <div>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Work</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-content">
      <h1>DEFINE YOUR FUTURE</h1>
      <p>Premium Digital Experiences</p>
      <a href="#" class="btn">Explore</a>
    </div>
  </div>

  <section>
    <h2>About</h2>
    <p>I create powerful and modern web experiences using cutting-edge tools.</p>
  </section>

  <footer>
    © 2026 Arshid | Premium Brand Experience
  </footer>

</body>
</html>
