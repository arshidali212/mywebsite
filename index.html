<!DOCTYPE html>
<html>
<head>
  <title>Arshid | Brand Style Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
    body {background:black;color:white;}

    nav {
      position:fixed;
      width:100%;
      display:flex;
      justify-content:space-between;
      padding:20px 50px;
      background:rgba(0,0,0,0.7);
    }

    nav a {
      color:white;
      text-decoration:none;
      margin-left:25px;
      font-weight:bold;
      letter-spacing:1px;
    }

    .hero {
      height:100vh;
      background:linear-gradient(to right,#000000,#434343);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .hero h1 {
      font-size:60px;
      font-weight:bold;
      letter-spacing:3px;
    }

    .hero p {
      margin-top:15px;
      font-size:20px;
      opacity:0.8;
    }

    .btn {
      margin-top:30px;
      padding:15px 35px;
      background:white;
      color:black;
      text-decoration:none;
      font-weight:bold;
      border-radius:30px;
      transition:0.3s;
    }

    .btn:hover {
      background:#ccc;
    }

    section {
      padding:100px 20px;
      text-align:center;
    }

    .cards {
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
      margin-top:40px;
    }

    .card {
      background:white;
      color:black;
      padding:30px;
      width:250px;
      border-radius:10px;
    }

    footer {
      padding:20px;
      text-align:center;
      background:#111;
      font-size:14px;
    }
  </style>
</head>
<body>

  <nav>
    <div><strong>ARSHID</strong></div>
    <div>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Work</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <div class="hero">
    <h1>CREATE. BUILD. DOMINATE.</h1>
    <p>Modern Web Experiences by Arshid</p>
    <a href="#" class="btn">Explore Now</a>
  </div>

  <section>
    <h2>What I Do</h2>
    <div class="cards">
      <div class="card">Web Design</div>
      <div class="card">UI Development</div>
      <div class="card">AI Powered Projects</div>
    </div>
  </section>

  <footer>
    © 2026 Arshid | Premium Brand Style Website
  </footer>

</body>
</html>
